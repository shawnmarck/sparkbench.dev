<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SparkBench — what runs on a DGX Spark{% endblock %}</title>
  <meta name="description" content="{% block description %}Open-source benchmarks and recipes for the NVIDIA GB10 DGX Spark. Real tok/s on real hardware.{% endblock %}">
  <meta property="og:title" content="{{ self.title() }}">
  <meta property="og:description" content="{{ self.description() }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site_url }}{% block canonical_path %}/{% endblock %}">
  <meta property="og:image" content="{{ site_url }}/public/og-card.svg">
  <meta property="og:site_name" content="SparkBench">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ self.title() }}">
  <meta name="twitter:description" content="{{ self.description() }}">
  <meta name="twitter:image" content="{{ site_url }}/public/og-card.svg">
  <link rel="canonical" href="{{ site_url }}{{ self.canonical_path() }}">
  <meta name="theme-color" content="#0c0c0e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="/public/style.css">
  <link rel="icon" type="image/svg+xml" href="/public/favicon.svg">
</head>
<body>
  <header>
    <nav>
      <a href="/" class="wordmark" aria-label="SparkBench home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 2L4 14H11L10 22L20 9H12L13 2Z" fill="#f5a14a" stroke="#f5a14a" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
        sparkbench<span class="dot">.</span>
      </a>
      <div class="nav-links">
        <a href="/#leaderboard">Leaderboard</a>
        <a href="/#recipes">Recipes</a>
        <a href="{{ tool_repo }}" class="ghbtn" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.4.5 0 5.9 0 12.5c0 5.3 3.4 9.7 8.2 11.3.6.1.8-.3.8-.6v-2.1c-3.3.7-4-1.6-4-1.6-.5-1.4-1.3-1.8-1.3-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2 1-.3 2-.4 3-.4s2 .1 3 .4c2.3-1.5 3.3-1.2 3.3-1.2.6 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.7-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.3v3.4c0 .3.2.7.8.6 4.8-1.6 8.2-6 8.2-11.3C24 5.9 18.6.5 12 .5z"/></svg>
          GitHub
        </a>
      </div>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <div class="footer-inner">
      <div>SparkBench · Built {{ built_at }} · Not affiliated with NVIDIA Corporation</div>
      <div class="footer-links">
        <a href="{{ tool_repo }}" target="_blank" rel="noopener">Repository</a>
        <a href="{{ tool_repo }}/blob/main/CONTRIBUTING.md" target="_blank" rel="noopener">Contribute</a>
        <a href="{{ tool_repo }}/issues" target="_blank" rel="noopener">Issues</a>
      </div>
    </div>
  </footer>
</body>
</html>
