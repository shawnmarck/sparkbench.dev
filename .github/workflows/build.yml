name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Rebuild nightly to pick up data changes from the tool repo
    - cron: "0 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml jinja2

      - name: Fetch data from sparkbench tool repo
        run: |
          mkdir -p data
          BASE="https://raw.githubusercontent.com/shawnmarck/sparkbench/main/data"
          curl -fsSL "$BASE/model-verification.yaml" -o data/model-verification.yaml
          curl -fsSL "$BASE/model-catalog.yaml"      -o data/model-catalog.yaml
          curl -fsSL "$BASE/golden-recipes.yaml"     -o data/golden-recipes.yaml

      - name: Build site
        run: python build.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
